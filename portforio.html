<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<style>

body{
  margin:0;
  font-family:sans-serif;
  background:#f5f5f5;
}

/* ヘッダー */
header{
  background:#111;
  color:white;
  text-align:center;
  padding:40px 20px;
}

/* 作品エリア */
.works{
  max-width:1000px;
  margin:50px auto;
  display:flex;
  gap:40px;
  flex-wrap:wrap;
  justify-content:center;
}

.work{
  width:400px;
  background:white;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.work img{
  width:100%;
}

.work-content{
  padding:20px;
}

.work a{
  display:inline-block;
  margin-top:10px;
  text-decoration:none;
  background:#111;
  color:white;
  padding:10px 20px;
  border-radius:5px;
}

</style>
</head>

<body>

<header>
<h1>Portfolio</h1>
<p>制作実績</p>
</header>

<section class="works">

<div class="work">
<img src="cafe.png">
<div class="work-content">
<h3>Cafe Site</h3>
<p>カフェのLPサイトを制作しました。</p>
<a href="cafe.html">サイトを見る</a>
</div>
</div>

<div class="work">
<img src="corporate.png">
<div class="work-content">
<h3>Corporate Site</h3>
<p>企業向けコーポレートサイトを制作しました。</p>
<a href="corporate.html">サイトを見る</a>
</div>
</div>

</section>

</body>
</html>
